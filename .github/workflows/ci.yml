name: Phase 2 Validation

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install
        run: npm install

      - name: Build and E2E
        run: npm run check

      - name: Check required docs
        run: |
          test -s README.md
          test -s docs/architecture.md
          test -s docs/shre-sdk-evaluation.md
          test -s docs/data-governance.md
          test -s docs/setup-tree.md
          test -s docs/customer-onboarding.md
          test -s docs/developer-onboarding.md
          test -s docs/support-runbook.md
          test -s docs/technical-specs.md
          test -s docs/environment-promotion.md
          test -s docs/commander-concurrency.md
          test -s docs/app-boundary-decision.md
          test -s docs/shre-marketplace-registration.md
          test -s docs/local-alias.md
          test -s docs/local-ai-ollama.md
          test -s docs/security-hardening.md
          test -s docs/login-billing.md
          test -s marketplace/verifone-commander.connector.json
