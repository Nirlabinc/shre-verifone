name: Phase 2 Validation

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install
        run: npm install

      - name: Build and E2E
        run: npm run check

      - name: Runtime guard smoke
        run: |
          tmp_runtime="$(mktemp -d)"
          VERIFONE_SHRE_HOME="$tmp_runtime" ./scripts/protect-runtime.sh mark
          test -f "$tmp_runtime/.runtime-protected"
          if VERIFONE_SHRE_HOME="$tmp_runtime" ./scripts/protect-runtime.sh allow-reset; then
            echo "Runtime reset unexpectedly allowed without override"
            exit 1
          fi
          ALLOW_VERIFONE_RUNTIME_RESET=I_UNDERSTAND_DELETE_LOCAL_DATA VERIFONE_SHRE_HOME="$tmp_runtime" ./scripts/protect-runtime.sh allow-reset

      - name: Update script smoke
        run: |
          bash -n scripts/production-update.sh
          bash -n scripts/pilot-preflight.sh
          test -s scripts/production-update.ps1
          test -s scripts/pilot-preflight.ps1

      - name: Check required docs
        run: |
          test -s README.md
          test -s docs/architecture.md
          test -s docs/shre-sdk-evaluation.md
          test -s docs/data-governance.md
          test -s docs/setup-tree.md
          test -s docs/customer-onboarding.md
          test -s docs/developer-onboarding.md
          test -s docs/support-runbook.md
          test -s docs/connectivity-rules.md
          test -s docs/storage-retention-backup.md
          test -s docs/production-update.md
          test -s docs/verifone-pdk-command-catalog.md
          test -s docs/technical-specs.md
          test -s docs/environment-promotion.md
          test -s docs/commander-concurrency.md
          test -s docs/app-boundary-decision.md
          test -s docs/addon-architecture.md
          test -s docs/fcc-connector.md
          test -s docs/shre-marketplace-registration.md
          test -s docs/local-alias.md
          test -s docs/local-ai-ollama.md
          test -s docs/security-hardening.md
          test -s docs/login-billing.md
          test -s docs/pilot-installation-guide.md
          test -s docs/pilot-production-readiness.md
          test -s docs/cloudflare-remote-access.md
          test -s docs/one-click-installer.md
          test -s marketplace/verifone-commander.connector.json
          test -s apps/product-landing/index.html
          test -s apps/access-portal/index.html
          test -s apps/chat-ui/index.html
          test -s scripts/install-oneclick.ps1
          test -s scripts/install-oneclick.sh
          test -s scripts/install-oneclick-aarch64.sh
          test -s scripts/install-oneclick-android-termux.sh
