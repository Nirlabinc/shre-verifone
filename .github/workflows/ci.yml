name: Phase 2 Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Check required docs
        run: |
          test -s README.md
          test -s docs/architecture.md
          test -s docs/shre-sdk-evaluation.md
          test -s docs/data-governance.md
