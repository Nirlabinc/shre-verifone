name: Release Artifacts

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install and validate
        run: |
          npm install
          npm run check
          bash -n scripts/install-oneclick.sh
          bash -n scripts/install-oneclick-aarch64.sh
          bash -n scripts/install-oneclick-android-termux.sh

      - name: Build release bundle
        run: |
          mkdir -p release
          tar --exclude=.git --exclude=node_modules --exclude=release -czf release/verifone-commander-shre-cstoresku-${GITHUB_REF_NAME}.tar.gz .
          zip -r release/verifone-commander-shre-cstoresku-${GITHUB_REF_NAME}.zip . -x ".git/*" "node_modules/*" "release/*"
          (cd release && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/verifone-commander-shre-cstoresku-${{ github.ref_name }}.tar.gz
            release/verifone-commander-shre-cstoresku-${{ github.ref_name }}.zip
            release/SHA256SUMS.txt
