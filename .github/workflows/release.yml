name: Release Candidate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install
        run: npm install

      - name: Validate
        run: npm run check

      - name: Preflight syntax
        run: |
          bash -n scripts/pilot-preflight.sh
          bash -n scripts/production-update.sh
          test -s scripts/pilot-preflight.ps1
          test -s scripts/production-update.ps1

      - name: Compose config
        run: |
          docker compose -f infra/docker-compose.yml config >/tmp/base-compose.yml
          CSTORESKU_LEGACY_IMAGE=varifone-service:latest \
          CSTORESKU_LEGACY_PLATFORM=linux/amd64 \
          docker compose -f infra/docker-compose.yml --profile cstoresku config >/tmp/cstoresku-compose.yml

      - name: Package release bundle
        run: |
          mkdir -p release
          tar -czf release/verifone-commander-shre-cstoresku-source.tgz \
            README.md package.json package-lock.json tsconfig.json \
            apps services scripts docs infra marketplace .env.example .env.prod.example
          cp /tmp/base-compose.yml release/docker-compose.rendered.yml
          cp /tmp/cstoresku-compose.yml release/docker-compose.cstoresku.rendered.yml
          sha256sum release/* > release/SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verifone-commander-shre-cstoresku-release
          path: release/

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
