<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status — Verifone Edge Relay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 1.5rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.25rem; color: #38bdf8; }
    .header .badge { padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 600; }
    .badge-ok { background: #14532d; color: #86efac; }
    .badge-warn { background: #713f12; color: #fde68a; }
    .badge-err { background: #7f1d1d; color: #fca5a5; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
    .card { background: #1e293b; border-radius: 0.75rem; padding: 1.25rem; border: 1px solid #334155; }
    .card h3 { font-size: 0.875rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .stat { display: flex; justify-content: space-between; padding: 0.375rem 0; font-size: 0.875rem; border-bottom: 1px solid #1e293b; }
    .stat-val { color: #38bdf8; font-weight: 500; }
    .stat-warn { color: #fbbf24; }
    .stat-err { color: #f87171; }
    .site { background: #0f172a; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 0.5rem; }
    .site-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .site-name { font-weight: 600; font-size: 0.875rem; }
    .site-ip { color: #94a3b8; font-size: 0.75rem; }
    .btn-sm { padding: 0.375rem 0.75rem; border: none; border-radius: 0.375rem; font-size: 0.75rem; cursor: pointer; background: #334155; color: #e2e8f0; }
    .btn-sm:hover { background: #475569; }
    .logs-table { width: 100%; font-size: 0.75rem; border-collapse: collapse; }
    .logs-table th { text-align: left; color: #94a3b8; padding: 0.375rem 0.5rem; border-bottom: 1px solid #334155; }
    .logs-table td { padding: 0.375rem 0.5rem; border-bottom: 1px solid #1e293b; }
    .refresh-bar { text-align: right; margin-bottom: 0.75rem; }
    .refresh-bar button { background: #334155; border: none; color: #94a3b8; padding: 0.375rem 0.75rem; border-radius: 0.375rem; cursor: pointer; font-size: 0.75rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab { padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; background: #1e293b; color: #94a3b8; border: none; }
    .tab.active { background: #38bdf8; color: #0f172a; font-weight: 600; }
    .section { display: none; } .section.active { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Verifone Edge Relay</h1>
    <span class="badge" id="status-badge">Loading...</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="showTab('sites')">Sites</button>
    <button class="tab" onclick="showTab('logs')">Activity</button>
    <button class="tab" onclick="showTab('security')">Security</button>
  </div>

  <!-- Dashboard -->
  <div class="section active" id="tab-dashboard">
    <div class="grid">
      <div class="card">
        <h3>Service Health</h3>
        <div id="health-stats"></div>
      </div>
      <div class="card">
        <h3>Sync Status</h3>
        <div id="sync-stats"></div>
      </div>
      <div class="card">
        <h3>Uplink Queue</h3>
        <div id="uplink-stats"></div>
      </div>
      <div class="card">
        <h3>Disk Usage</h3>
        <div id="disk-stats"></div>
      </div>
      <div class="card">
        <h3>Password Health</h3>
        <div id="password-stats"></div>
      </div>
      <div class="card">
        <h3>Updates</h3>
        <div id="update-stats"></div>
      </div>
    </div>
  </div>

  <!-- Sites -->
  <div class="section" id="tab-sites">
    <div id="sites-list"></div>
  </div>

  <!-- Activity Logs -->
  <div class="section" id="tab-logs">
    <div class="refresh-bar"><button onclick="loadLogs()">Refresh</button></div>
    <div class="card"><div id="activity-logs"></div></div>
  </div>

  <!-- Security -->
  <div class="section" id="tab-security">
    <div class="grid">
      <div class="card">
        <h3>Audit Chain</h3>
        <div id="audit-stats"></div>
      </div>
      <div class="card">
        <h3>Anomalies</h3>
        <div id="anomaly-list"></div>
      </div>
    </div>
  </div>

  <script>
    let statusData = null;

    function showTab(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${name}`).classList.add('active');
      event.target.classList.add('active');
      if (name === 'logs') loadLogs();
      if (name === 'security') loadSecurity();
    }

    function stat(label, value, cls) {
      return `<div class="stat"><span>${label}</span><span class="stat-val ${cls || ''}">${value}</span></div>`;
    }

    async function loadStatus() {
      try {
        const res = await fetch('/api/status');
        statusData = await res.json();
        render();
      } catch (err) {
        document.getElementById('status-badge').textContent = 'Offline';
        document.getElementById('status-badge').className = 'badge badge-err';
      }
    }

    function render() {
      const d = statusData;
      const h = d.health;
      const badge = document.getElementById('status-badge');
      badge.textContent = h.status.charAt(0).toUpperCase() + h.status.slice(1);
      badge.className = `badge ${h.status === 'healthy' ? 'badge-ok' : h.status === 'degraded' ? 'badge-warn' : 'badge-err'}`;

      // Health
      const uptimeH = Math.floor(h.uptimeMs / 3600000);
      const uptimeM = Math.floor((h.uptimeMs % 3600000) / 60000);
      document.getElementById('health-stats').innerHTML =
        stat('Status', h.status) +
        stat('Uptime', `${uptimeH}h ${uptimeM}m`) +
        stat('Sites', h.sites) +
        stat('Last Heartbeat', h.lastHeartbeat ? new Date(h.lastHeartbeat).toLocaleTimeString() : 'N/A');

      // Sync
      const syncEntries = Object.entries(d.sync || {});
      document.getElementById('sync-stats').innerHTML = syncEntries.length
        ? syncEntries.map(([id, s]) => stat(id, `Cycle #${s.cycleCount} ${s.running ? '(running)' : ''}`)).join('')
        : '<p style="color:#94a3b8;font-size:0.875rem">No active syncs</p>';

      // Uplink
      const u = d.uplink;
      document.getElementById('uplink-stats').innerHTML =
        stat('Pending', u.pending, u.pending > 50 ? 'stat-warn' : '') +
        stat('Total Sent', u.totalSent) +
        stat('Oldest', u.oldest ? new Date(u.oldest).toLocaleString() : 'N/A');

      // Disk
      const dk = d.disk;
      const diskCls = dk.status === 'ok' ? '' : dk.status === 'warning' ? 'stat-warn' : 'stat-err';
      document.getElementById('disk-stats').innerHTML =
        stat('Free Space', dk.freeMB !== null ? `${dk.freeMB} MB` : 'Unknown', diskCls) +
        stat('Status', dk.status, diskCls);

      // Reports
      const r = d.reports;
      document.getElementById('sync-stats').innerHTML +=
        stat('Reports', `${r.reports.pending} pending / ${r.reports.total} total`) +
        stat('Transactions', `${r.transactions.pending} pending / ${r.transactions.total} total`);

      // Passwords
      const pwds = d.passwordHealth || [];
      document.getElementById('password-stats').innerHTML = pwds.length
        ? pwds.map(p => {
            const cls = p.status === 'healthy' ? '' : p.status === 'expired' || p.status === 'critical' ? 'stat-err' : 'stat-warn';
            return stat(p.siteName || p.siteId, `${p.daysRemaining}d remaining (${p.status})`, cls);
          }).join('')
        : '<p style="color:#94a3b8;font-size:0.875rem">No sites configured</p>';

      // Updates
      const up = d.update;
      document.getElementById('update-stats').innerHTML = up.available
        ? stat('Available', `v${up.version}`) + `<button class="btn-sm" style="margin-top:0.5rem" onclick="alert('Update will install automatically')">Install Update</button>`
        : stat('Status', 'Up to date');

      // Sites tab
      const sites = d.sites || [];
      document.getElementById('sites-list').innerHTML = sites.length
        ? sites.map(s => `
          <div class="card" style="margin-bottom:0.75rem">
            <div class="site-header">
              <div><span class="site-name">${s.site_name || s.site_id}</span> <span class="site-ip">${s.commander_ip}</span></div>
              <div>
                <button class="btn-sm" onclick="triggerSync('${s.site_id}')">Sync Now</button>
                <button class="btn-sm" onclick="testSite('${s.site_id}')">Test</button>
              </div>
            </div>
            ${stat('Enabled', s.enabled ? 'Yes' : 'No')}
            ${stat('Interval', `${(s.sync_interval_ms || 300000) / 1000}s`)}
          </div>
        `).join('')
        : '<div class="card"><p style="color:#94a3b8">No sites configured</p></div>';
    }

    async function loadLogs() {
      try {
        const res = await fetch('/api/logs/activity?limit=50');
        const data = await res.json();
        const logs = data.logs || [];
        document.getElementById('activity-logs').innerHTML = logs.length
          ? `<table class="logs-table">
              <tr><th>Time</th><th>Dir</th><th>Method</th><th>Path</th><th>Status</th><th>Duration</th></tr>
              ${logs.map(l => `<tr>
                <td>${new Date(l.ts).toLocaleTimeString()}</td>
                <td>${l.direction}</td>
                <td>${l.method || ''}</td>
                <td>${(l.path || '').slice(0, 40)}</td>
                <td>${l.status || ''}</td>
                <td>${l.duration_ms || ''}ms</td>
              </tr>`).join('')}
            </table>`
          : '<p style="color:#94a3b8;font-size:0.875rem">No activity logged yet</p>';
      } catch { /* ignore */ }
    }

    async function loadSecurity() {
      try {
        const [auditRes, anomalyRes] = await Promise.all([
          fetch('/api/audit/verify'), fetch('/api/logs/anomalies?limit=20'),
        ]);
        const audit = await auditRes.json();
        const anomalies = await anomalyRes.json();

        document.getElementById('audit-stats').innerHTML =
          stat('Chain Valid', audit.valid ? 'Yes' : 'BROKEN', audit.valid ? '' : 'stat-err') +
          stat('Entries', audit.entries);

        const anoms = anomalies.anomalies || [];
        document.getElementById('anomaly-list').innerHTML = anoms.length
          ? anoms.map(a => {
              const cls = a.severity === 'critical' ? 'stat-err' : a.severity === 'high' ? 'stat-warn' : '';
              return stat(a.rule, `${a.severity} — ${a.detail?.message || ''}`.slice(0, 50), cls);
            }).join('')
          : '<p style="color:#94a3b8;font-size:0.875rem">No anomalies detected</p>';
      } catch { /* ignore */ }
    }

    async function triggerSync(siteId) {
      await fetch(`/api/sites/${siteId}/sync`, { method: 'POST' });
      setTimeout(loadStatus, 2000);
    }

    async function testSite(siteId) {
      const res = await fetch(`/api/sites/${siteId}/test`, { method: 'POST' });
      const data = await res.json();
      alert(data.reachable ? 'Connection successful!' : `Failed: ${data.error}`);
    }

    loadStatus();
    setInterval(loadStatus, 30000);
  </script>
</body>
</html>
