services:
  verifone-edge-relay:
    image: ghcr.io/nirlabinc/verifone-edge-relay:latest
    container_name: verifone-edge-relay
    ports:
      - "18464:18464"
    volumes:
      - relay-data:/data
    restart: unless-stopped
    environment:
      - COMMANDER_IP=${COMMANDER_IP:-192.168.31.11}
      - RELAY_DATA_DIR=/data
      - LOG_LEVEL=info
    extra_hosts:
      - "commander:host-gateway"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_LABEL_ENABLE=false
    restart: unless-stopped

volumes:
  relay-data:
