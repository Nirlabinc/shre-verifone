services:
  verifone-edge-relay:
    build: .
    container_name: verifone-edge-relay
    ports:
      - "18464:18464"
    volumes:
      - relay-data:/data
    restart: unless-stopped
    environment:
      - COMMANDER_IP=${COMMANDER_IP:-192.168.31.11}
      - RELAY_DATA_DIR=/data
      - LOG_LEVEL=info
    # Note: on macOS, host networking doesn't work (Docker runs in a VM).
    # The relay connects to Commander via the Mac's LAN IP which is
    # accessible from the container via host.docker.internal on Mac.
    extra_hosts:
      - "commander:host-gateway"

volumes:
  relay-data:
