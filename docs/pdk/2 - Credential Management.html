<!DOCTYPE html>
<html>
    <title>Verifone Services - Credenital Management</title>
    <Head>
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    </Head>
    <style>
        table, th, td {
            border: 1px solid black;
        }
    </style>
    <body onload="updateLoginURL()">
        <script type="text/javascript">
            function paramPassing() {
                alert(window.location.href);
            }
        </script>

        <h1>Verifone Services - OTP</h1>
        <p>It will allow you to generate OTP.</p>

        IP: <input type="text" id="VerifoneIp" value="192.168.31.11" onchange="updateLoginURL()"/>
        Uername: <input type="text" id="Username" value="manager" onchange="updateLoginURL()"/>
        Password: <input type="text" id="Password" value="QA12345" onchange="updateLoginURL()"/>
<p>
        Cookie: <input type="text" id="Cookie" value="PASTE COOKIE HERE" onchange="updateOtpURL()"/>

        <script type="text/javascript">
            
            function updateLoginURL() {
                verifoneIp = document.getElementById('VerifoneIp').value;
                username = document.getElementById('Username').value;
                password = document.getElementById('Password').value;

                loginCommand = "https://" + verifoneIp + "/cgi-bin/CGILink?cmd=validate&user=" + username +  "&passwd=" + password;

                document.getElementById("LoginCommand").textContent = loginCommand;
                document.getElementById("LoginCommand").href = loginCommand;

                updateOtpURL();
            }

            function updateOtpURL() {
                verifoneIp = document.getElementById('VerifoneIp').value;
                cookie = document.getElementById('Cookie').value;

                otpCommand = "https://" + verifoneIp + "/cgi-bin/CGILink?cmd=cenablelogin&cookie=" + cookie;

                document.getElementById("OptCommand").textContent = otpCommand;
                document.getElementById("OptCommand").href = otpCommand;
            }
        </script>

        <p>
        <table>
            <tr>
                <th>Index</th><th>Step</th>    <th>Link</th>
            </tr>
            <tr>
                <td>1</td><td>Login Command</td>  <td><a href="No-Link" id="LoginCommand" target="_blank">No-link</a></td>
            </tr>
            <tr>
                <td>2</td><td>OTP Command</td>  <td><a href="No-Link" id="OptCommand" target="_blank">No-link</a></td>
            </tr>
        </table>

        <h3 color='0xff0000'>INSTRUCTIONS:</h3>
        <p>Please follow instructions. </p>
        <p></p>

    </body>
</html>
