services:
  dashboard-api:
    build:
      context: ..
      dockerfile: infra/node.Dockerfile
    command: ["node", "dist/apps/dashboard-api/src/server.js"]
    environment:
      PORT: "5480"
      HOST: "0.0.0.0"
      VERIFONE_SHRE_HOME: /runtime
      CSTORESKU_RUNTIME_ROOT: /runtime/cstoresku-runtime
      SHRE_ENDPOINT: ${SHRE_ENDPOINT:-https://apiauth.shre.ai}
      SHRE_EVENTS_ENDPOINT: ${SHRE_EVENTS_ENDPOINT:-https://events.shre.ai}
      SHRE_TENANT_ID: ${SHRE_TENANT_ID:-}
      SHRE_APP: ${SHRE_APP:-verifone_commander_cstoresku}
      SHRE_MODE: ${SHRE_MODE:-read_only}
      CONNECTOR_REGISTRY_URL: ${CONNECTOR_REGISTRY_URL:-https://connector.aros.live}
      CONNECTOR_SHARED_SECRET: ${CONNECTOR_SHARED_SECRET:-}
      LOCAL_ADMIN_TOKEN: ${LOCAL_ADMIN_TOKEN:-}
      LOCAL_BASE_URL: ${LOCAL_BASE_URL:-http://cstoresku:5480}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      BUILD_CHANNEL: ${BUILD_CHANNEL:-local}
      BUILD_SHA: ${BUILD_SHA:-dev}
    volumes:
      - verifone-shre-runtime:/runtime
    ports:
      - "127.0.0.1:${HOST_PORT:-5480}:5480"
    restart: unless-stopped

  cstoresku-runtime-init:
    image: alpine:3.20
    command: ["sh", "-c", "mkdir -p /runtime/cstoresku-runtime/DataSource /runtime/cstoresku-runtime/xml /runtime/cstoresku-runtime/logs && chmod -R 700 /runtime/cstoresku-runtime"]
    volumes:
      - verifone-shre-runtime:/runtime
    profiles:
      - cstoresku

  cstoresku-legacy:
    image: ${CSTORESKU_LEGACY_IMAGE:-varifone-service:latest}
    platform: ${CSTORESKU_LEGACY_PLATFORM:-linux/amd64}
    depends_on:
      cstoresku-runtime-init:
        condition: service_completed_successfully
      dashboard-api:
        condition: service_started
    volumes:
      - type: volume
        source: verifone-shre-runtime
        target: /app/DataSource
        volume:
          subpath: cstoresku-runtime/DataSource
      - type: volume
        source: verifone-shre-runtime
        target: /app/xml
        volume:
          subpath: cstoresku-runtime/xml
      - type: volume
        source: verifone-shre-runtime
        target: /app/logs
        volume:
          subpath: cstoresku-runtime/logs
    profiles:
      - cstoresku
    restart: unless-stopped

  shre-connector:
    build:
      context: ..
      dockerfile: infra/node.Dockerfile
    command: ["node", "dist/services/shre-connector/src/worker.js"]
    environment:
      VERIFONE_SHRE_HOME: /runtime
      SHRE_ENDPOINT: ${SHRE_ENDPOINT:-https://apiauth.shre.ai}
      SHRE_EVENTS_ENDPOINT: ${SHRE_EVENTS_ENDPOINT:-https://events.shre.ai}
      SHRE_TENANT_ID: ${SHRE_TENANT_ID:-}
      SHRE_APP: ${SHRE_APP:-verifone_commander_cstoresku}
      SHRE_MODE: ${SHRE_MODE:-read_only}
      SHRE_BOOTSTRAP_KEY: ${SHRE_BOOTSTRAP_KEY:-}
      CONNECTOR_REGISTRY_URL: ${CONNECTOR_REGISTRY_URL:-https://connector.aros.live}
    volumes:
      - verifone-shre-runtime:/runtime
    restart: unless-stopped

  queue-worker:
    build:
      context: ..
      dockerfile: infra/node.Dockerfile
    command: ["node", "dist/services/queue-worker/src/worker.js"]
    environment:
      VERIFONE_SHRE_HOME: /runtime
    volumes:
      - verifone-shre-runtime:/runtime
    restart: unless-stopped

  diagnostics:
    build:
      context: ..
      dockerfile: infra/node.Dockerfile
    command: ["node", "dist/services/diagnostics/src/worker.js"]
    environment:
      VERIFONE_SHRE_HOME: /runtime
    volumes:
      - verifone-shre-runtime:/runtime
    restart: unless-stopped

  fcc-connector:
    build:
      context: ..
      dockerfile: infra/node.Dockerfile
    command: ["node", "dist/services/fcc-connector/src/worker.js"]
    environment:
      FCC_PORT: "5483"
      FCC_HOST: "0.0.0.0"
      VERIFONE_SHRE_HOME: /runtime
      FCC_ENDPOINT: ${FCC_ENDPOINT:-}
      FCC_MODE: ${FCC_MODE:-diagnostic_only}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      BUILD_CHANNEL: ${BUILD_CHANNEL:-local}
      BUILD_SHA: ${BUILD_SHA:-dev}
    volumes:
      - verifone-shre-runtime:/runtime
    ports:
      - "127.0.0.1:5483:5483"
    profiles:
      - fcc
    restart: unless-stopped

volumes:
  verifone-shre-runtime:
